{% extends "base.html" %}

{% block page_title %}Edit Rule{% endblock %}

{% block content %}
<div class="form-page">
    <div class="page-header">
        <h2>Edit Rule: {{ rule.rule_id }}</h2>
    </div>
    
    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('admin.edit_rule', rule_id=rule.rule_id) }}" class="form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="category">Category <span class="required">*</span></label>
                        <select id="category" name="category" required>
                            <option value="positive" {% if rule.category == 'positive' %}selected{% endif %}>Positive</option>
                            <option value="negative" {% if rule.category == 'negative' %}selected{% endif %}>Negative</option>
                            <option value="intermediate" {% if rule.category == 'intermediate' %}selected{% endif %}>Intermediate</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="outcome">Outcome <span class="required">*</span></label>
                        <input type="text" id="outcome" name="outcome" value="{{ rule.outcome }}" required>
                    </div>
                    <div class="form-group">
                        <label for="confidence_wt">Confidence Weight <span class="required">*</span></label>
                        <input type="number" id="confidence_wt" name="confidence_wt" min="0" max="1" step="0.01" value="{{ rule.confidence_wt }}" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="condition_text">Human-Readable Conditions <span class="required">*</span></label>
                    <textarea id="condition_text" name="condition_text" rows="2" required>{{ rule.condition_text }}</textarea>
                </div>
                
                <div class="form-group">
                    <label for="condition_json">JSON Conditions <span class="required">*</span></label>
                    <textarea id="condition_json" name="condition_json" rows="4" required>{{ rule.condition_json }}</textarea>
                </div>
                
                <div class="form-actions">
                    <a href="{{ url_for('admin.rules') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Update Rule</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
