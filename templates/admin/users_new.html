{% extends "base.html" %}

{% block page_title %}Add New User{% endblock %}

{% block content %}
<div class="form-page">
    <div class="page-header">
        <h2>Add New User</h2>
    </div>
    
    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('admin.new_user') }}" class="form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="username">Username <span class="required">*</span></label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="role">Role <span class="required">*</span></label>
                        <select id="role" name="role" required>
                            <option value="clinical_user">Clinical User</option>
                            <option value="administrator">Administrator</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="facility_id">Facility ID</label>
                        <input type="text" id="facility_id" name="facility_id">
                    </div>
                    <div class="form-group">
                        <label for="password">Password <span class="required">*</span></label>
                        <input type="password" id="password" name="password" required>
                    </div>
                </div>
                
                <div class="form-actions">
                    <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create User</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
