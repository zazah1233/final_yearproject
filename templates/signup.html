{% extends "base.html" %}

{% block title %}Sign Up - ZAZAH{% endblock %}

{% block login_content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">🦠</div>
            <h1>ZAZAH</h1>
            <p class="login-subtitle">Create a new account</p>
        </div>

        <form method="POST" action="{{ url_for('auth.signup') }}" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ session.get('csrf_token') }}">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus>
            </div>

            <div class="form-group">
                <label for="facility_id">Facility ID</label>
                <input type="text" id="facility_id" name="facility_id" required autocomplete="organization">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <div class="login-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
